<body class="bg-background text-on-background antialiased min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 shadow-sm flex justify-between items-center px-5 h-16">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-full overflow-hidden bg-surface-container">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="Close-up portrait of a smiling young woman with natural makeup and soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3puzSQBnFPCFtnglUvf-9BbGEROEPMtTpg8fXNaOQFGkuCJQHqTGDu0brwq2IwTAsSVgv1fswExrrbCD-E9lxow3S81nNRblooX9_nWphYfqEjarSIuQo4Qk9dJbv1zohqUy-z6HbtQqlwWZdFgCuhQbmvG_KSY3HpHvY_hFmKb3-Z5cnsPcCkXoqncimIEgObrReP5WD9kmsD90ggzxPwfIuYwiKovuYpUr80RnNVb-EG_zXDQCaUphWTUnzNLjI5haiKZ8P13vZ"/>
</div>
<h1 class="text-xl font-bold tracking-tight text-primary font-['Inter'] antialiased">VitalClarity</h1>
</div>
<button class="text-primary hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors active:scale-95 transition-transform duration-200 w-10 h-10 flex items-center justify-center rounded-full">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-28 px-container-padding max-w-2xl mx-auto flex flex-col gap-lg">
<!-- Today's Progress Bento Card -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex items-center justify-between relative overflow-hidden">
<div class="relative z-10">
<h2 class="font-h2 text-h2 text-on-surface">Daily Progress</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">3 of 4 doses taken</p>
</div>
<!-- Progress Ring -->
<div class="relative w-20 h-20 shrink-0 z-10">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<!-- Background Track -->
<path class="text-surface-container-high" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3.5"></path>
<!-- Progress (75%) -->
<path class="text-secondary" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-dasharray="75, 100" stroke-linecap="round" stroke-width="3.5"></path>
</svg>
<div class="absolute inset-0 flex items-center justify-center font-label-bold text-label-bold text-secondary">
                    75%
                </div>
</div>
<!-- Decorative gradient orb -->
<div class="absolute -right-8 -bottom-8 w-32 h-32 bg-secondary/5 rounded-full blur-2xl z-0"></div>
</section>
<!-- Emergency Contact Quick-Call -->
<section class="bg-primary-container rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] flex items-center gap-md">
<div class="w-12 h-12 rounded-full overflow-hidden shrink-0 border-2 border-primary-fixed">
<img alt="Dr. Sarah Jenkins" class="w-full h-full object-cover" data-alt="Professional portrait of a female doctor in a white coat with a stethoscope smiling confidently" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyB5sew5meSS5r7oTaChkyRVFvaKiIuz6ciXpACNeAfQeiNfxyjaPJ_PEmc3hnWS9rZNCnlhBrARVc24JAVZV-q-3FsAiY2_kG2rNdbdqKdju4B0ELQgqgK3CguZKHjnFPXtLX6gdXDXBP6i-k0LEuWQjPPcJDCljA_NI4Y_ULQwWwPIlitxJ95x81W3Zdq7tBtDDaGjv6t-5k3o5wtYXKST4zzxdxL1QnsNnmAXq1t-6lSbiRtHftaSZZMD2TD1fUZIOiJN0eUVpJ"/>
</div>
<div class="flex-1">
<h3 class="font-label-bold text-label-bold text-on-primary-container">Dr. Sarah Jenkins</h3>
<p class="font-label-sm text-label-sm text-on-primary-container/80 mt-xs">Primary Care Physician</p>
</div>
<a class="w-11 h-11 bg-primary text-on-primary rounded-full flex items-center justify-center shrink-0 shadow-sm hover:bg-primary/90 transition-colors active:scale-95" href="tel:#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
</a>
</section>
<!-- Today's Schedule -->
<section class="mt-md">
<h2 class="font-h1 text-h1 text-on-background mb-stack-gap">Today's Schedule</h2>
<div class="flex flex-col gap-stack-gap">
<!-- Checked Medication Card -->
<a class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex items-center gap-md transition-transform active:scale-[0.98]" href="#">
<!-- Checkbox state (Checked) -->
<div class="w-10 h-10 rounded-full bg-secondary text-on-secondary flex items-center justify-center shrink-0 shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-h2 text-h2 text-on-surface line-through opacity-60 truncate">Lisinopril</h3>
<p class="font-label-bold text-label-bold text-outline mt-xs">8:00 AM • 10mg</p>
</div>
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center text-outline-variant shrink-0">
<span class="material-symbols-outlined text-[28px]">pill</span>
</div>
</a>
<!-- Active Medication Card -->
<a class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border-l-4 border-l-primary border-y border-r border-outline-variant/30 flex items-center gap-md transition-transform active:scale-[0.98]" href="#">
<!-- Checkbox state (Active/Unchecked) -->
<div class="w-10 h-10 rounded-full border-2 border-outline-variant text-transparent flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-sm">check</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-h2 text-h2 text-on-surface truncate">Metformin</h3>
<p class="font-label-bold text-label-bold text-primary mt-xs">12:00 PM • 500mg</p>
</div>
<div class="w-12 h-12 bg-primary-fixed rounded-lg flex items-center justify-center text-primary shrink-0">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
</a>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-2 pb-safe z-50 rounded-t-2xl bg-white dark:bg-slate-900 border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] md:hidden">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-primary scale-110 active:scale-90 transition-transform duration-150 w-16" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] antialiased text-[10px] font-semibold mt-1">Home</span>
</a>
<!-- Schedule (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 transition-transform duration-150 w-16" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-['Inter'] antialiased text-[10px] font-semibold mt-1">Schedule</span>
</a>
<!-- Add (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 transition-transform duration-150 w-16" href="#">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-['Inter'] antialiased text-[10px] font-semibold mt-1">Add</span>
</a>
<!-- Health (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 transition-transform duration-150 w-16" href="#">
<span class="material-symbols-outlined">monitor_heart</span>
<span class="font-['Inter'] antialiased text-[10px] font-semibold mt-1">Health</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 transition-transform duration-150 w-16" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] antialiased text-[10px] font-semibold mt-1">Settings</span>
</a>
</nav>
</body></html>
