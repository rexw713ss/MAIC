<h1 class="font-h1 text-h1 text-on-background mt-md mb-xs">Health Hub</h1>
<!-- Weekly Adherence Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md">
<div class="flex justify-between items-center">
<h2 class="font-h2 text-h2 text-on-surface">Weekly Adherence</h2>
<div class="font-display text-display text-primary">92%</div>
</div>
<div class="flex justify-between items-center mt-sm">
<!-- Day M -->
<div class="flex flex-col items-center gap-xs">
<span class="font-caption text-caption text-on-surface-variant">M</span>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-sm">check</span>
</div>
</div>
<!-- Day T -->
<div class="flex flex-col items-center gap-xs">
<span class="font-caption text-caption text-on-surface-variant">T</span>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-sm">check</span>
</div>
</div>

<div class="flex flex-col items-center gap-xs">
<span class="font-caption text-caption text-on-surface-variant">W</span>

<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-sm">check</span>
</div>
</div>

<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container text-sm">check</span>
</div>
</div>

<span class="font-caption text-caption text-on-surface-variant">S</span>
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">close</span>
</div>
</div>

<div class="flex flex-col items-center gap-xs">
<span class="font-caption text-caption text-primary">S</span>
<div class="w-8 h-8 rounded-full border-2 border-primary border-dashed flex items-center justify-center bg-surface-container-lowest">

</div>
</div>
</div>

</div>

</div>
<div>
<div class="font-display text-display text-on-surface flex items-baseline gap-1">
                        72 <span class="font-label-sm text-label-sm text-on-surface-variant">bpm</span>
</div>
</div>
