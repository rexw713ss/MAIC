<span class="font-caption text-caption uppercase mb-1">Tue</span>
<span class="font-h2 text-h2">13</span>
</button>
<button class="flex flex-col items-center justify-center w-[54px] h-[72px] rounded-lg bg-primary text-on-primary shadow-[0_4px_12px_rgba(0,0,0,0.15)] flex-shrink-0 scale-105">
<span class="font-caption text-caption uppercase mb-1 opacity-90">Wed</span>
<span class="font-h2 text-h2">14</span>
</button>

<span class="font-h2 text-h2">16</span>
</button>

<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-on-surface-variant text-xl">wb_sunny</span>
<h2 class="font-h2 text-h2 text-on-surface">Morning</h2>
</div>
<!-- Medication Card: Lisinopril (Taken) -->
<a class="flex items-center p-4 bg-surface-container-lowest rounded-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] min-h-[88px] gap-4 active:scale-[0.98] transition-transform" href="#">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
<div class="flex-1 flex flex-col justify-center">
<span class="font-label-bold text-label-bold text-on-surface">Lisinopril</span>
<span class="font-body-md text-body-md text-on-surface-variant mt-0.5">10mg • 8:00 AM</span>
</div>
<button aria-label="Mark as taken" class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-on-secondary flex-shrink-0 shadow-sm">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</a>

<span class="font-label-bold text-label-bold text-on-surface">Vitamin D3</span>

</div>
<button aria-label="Mark as taken" class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center flex-shrink-0">
</button>
</a>
</section>
<!-- Evening Schedule Group -->

<div class="flex items-center gap-2 mb-2 mt-4">
<span class="material-symbols-outlined text-on-surface-variant text-xl">clear_night</span>
<h2 class="font-h2 text-h2 text-on-surface">Evening</h2>
</div>
<!-- Medication Card: Atorvastatin (Not Taken) -->
<a class="flex items-center p-4 bg-surface-container-lowest rounded-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] min-h-[88px] gap-4 active:scale-[0.98] transition-transform" href="#">

</button>

<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-primary flex-shrink-0">
<span class="material-symbols-outlined">nightlight</span>
</div>
<div class="flex-1 flex flex-col justify-center">
<span class="font-label-bold text-label-bold text-on-surface">Melatonin</span>
<span class="font-body-md text-body-md text-on-surface-variant mt-0.5">5mg • 9:30 PM</span>
</div>
<button aria-label="Mark as taken" class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center flex-shrink-0">
</button>
</a>
</section>
