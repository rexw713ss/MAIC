<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedCheck - Scan Prescription</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e3e2e7",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#72fe88",
                        "on-background": "#1a1b1f",
                        "surface-container-highest": "#e3e2e7",
                        "surface-container": "#eeedf3",
                        "on-tertiary-fixed-variant": "#930005",
                        "on-surface": "#1a1b1f",
                        "inverse-on-surface": "#f1f0f5",
                        "secondary-fixed-dim": "#53e16f",
                        "on-secondary-fixed-variant": "#00531c",
                        "on-tertiary-fixed": "#410001",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f4f3f8",
                        "surface": "#faf9fe",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-container": "#e2241f",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#bc000a",
                        "surface-dim": "#dad9df",
                        "on-primary-fixed": "#001a41",
                        "on-primary-fixed-variant": "#004493",
                        "inverse-primary": "#adc6ff",
                        "secondary": "#006e28",
                        "on-primary-container": "#fefcff",
                        "secondary-container": "#6ffb85",
                        "surface-container-high": "#e9e7ed",
                        "outline-variant": "#c1c6d7",
                        "error": "#ba1a1a",
                        "background": "#faf9fe",
                        "outline": "#717786",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2f3034",
                        "surface-tint": "#005bc1",
                        "on-secondary-fixed": "#002107",
                        "tertiary-fixed": "#ffdad5",
                        "on-tertiary-container": "#fffbff",
                        "surface-bright": "#faf9fe",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "primary-fixed-dim": "#adc6ff",
                        "primary": "#0058bc",
                        "on-error-container": "#93000a",
                        "primary-container": "#0070eb",
                        "on-secondary-container": "#00732a",
                        "on-surface-variant": "#414755"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "unit": "4px",
                        "stack-gap": "12px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "display": ["Inter"],
                        "caption": ["Inter"],
                        "h2": ["Inter"],
                        "h1": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.4px", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "500" }],
                        "h2": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.4px", "fontWeight": "600" }],
                        "h1": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.4px", "fontWeight": "700" }],
                        "label-bold": ["15px", { "lineHeight": "20px", "letterSpacing": "-0.2px", "fontWeight": "600" }],
                        "body-md": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.4px", "fontWeight": "400" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "-0.1px", "fontWeight": "400" }],
                        "body-lg": ["20px", { "lineHeight": "25px", "letterSpacing": "-0.2px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom hole punch effect for the scanner */
        .scanner-overlay {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-black text-on-surface h-screen w-full overflow-hidden relative font-body-md select-none">
<!-- Camera Feed Background Simulator -->
<div class="absolute inset-0 z-0">
<img alt="Camera feed showing a close up of an amber prescription pill bottle with a white label sitting on a bright modern counter" class="w-full h-full object-cover object-center scale-105 filter contrast-125 brightness-90" data-alt="close up of an amber prescription pill bottle with a white label sitting on a bright modern counter, soft daylight, slightly blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCse5_jYnA7sK_Qc25y1dUlBOZW-KC-PvkTJT55PdWWts6BYnh913NQfWbsEMAYuu9qU2A3UfHFaZ3QibuK0ef6YqJelaEZvYfq_h2HJa6dn07qej06u2YOc118NAubESbhlyzzlsDFDtOwGdkBWQNsEAj1g-Cd15GgEY62mKpzDcWUMbCBs3cKgLfzOIGhXX41Uay1Q5RkokxeD9WSPaKR47xSv_R-ZsF0disrlF7P2I0LqetGxA0LUqAHHom1T1fYqHJpnUO59UFS"/>
<!-- Simulated OCR Text Highlights -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center opacity-80 pointer-events-none">
<!-- Positioned roughly over where text might be on the bottle in the center -->
<div class="w-48 h-6 bg-secondary-container/50 border border-secondary-container rounded-xs absolute top-[42%] left-[25%] transform -rotate-2"></div>
<div class="w-32 h-5 bg-secondary-container/50 border border-secondary-container rounded-xs absolute top-[47%] left-[28%] transform -rotate-1"></div>
<div class="w-56 h-8 bg-secondary-container/60 border-2 border-secondary-container rounded-xs absolute top-[52%] left-[22%] transform -rotate-2 animate-pulse"></div>
<div class="w-24 h-4 bg-secondary-container/40 border border-secondary-container rounded-xs absolute top-[60%] left-[26%] transform -rotate-1"></div>
</div>
</div>
<!-- Header / Top App Bar (Custom for Task Screen) -->
<header class="absolute top-0 w-full z-30 flex items-center justify-between px-container-padding pt-12 pb-md bg-gradient-to-b from-black/70 to-transparent">
<button class="flex items-center text-on-primary font-label-bold active:opacity-70 transition-opacity">
            Cancel
        </button>
<h1 class="font-h2 text-on-primary absolute left-1/2 transform -translate-x-1/2">
            Scan Label
        </h1>
<!-- Invisible placeholder to balance flex space -->
<div class="w-12"></div>
</header>
<!-- Scanner Viewfinder UI -->
<main class="absolute inset-0 z-20 flex flex-col items-center justify-center pointer-events-none">
<!-- The Reticle (Clear area with dark surround) -->
<div class="relative w-[85%] max-w-sm aspect-[3/4] rounded-xl scanner-overlay border-2 border-white/20 transition-all duration-300 flex items-center justify-center">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-secondary rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-secondary rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-secondary rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-secondary rounded-br-xl"></div>
<!-- Center Crosshair (Subtle) -->
<div class="absolute w-8 h-[1px] bg-white/30"></div>
<div class="absolute w-[1px] h-8 bg-white/30"></div>
</div>
<!-- Instructional Text -->
<div class="mt-lg bg-black/50 backdrop-blur-sm px-lg py-sm rounded-full text-center">
<p class="font-label-bold text-on-primary flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">document_scanner</span>
                Align prescription details within frame
            </p>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="absolute bottom-20 w-full z-30 pb-8 pt-xl bg-gradient-to-t from-black/90 via-black/50 to-transparent flex flex-col items-center justify-end">
<!-- Capture Button -->
<div class="flex items-center justify-center gap-xl w-full px-container-padding">
<!-- Flash Toggle (Secondary action) -->
<button class="w-12 h-12 rounded-full bg-surface-variant/20 backdrop-blur-md flex items-center justify-center text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">flash_on</span>
</button>
<!-- Main Capture Ring -->
<button class="relative w-20 h-20 flex items-center justify-center rounded-full border-4 border-white active:scale-95 transition-transform duration-150">
<div class="w-[68px] h-[68px] bg-white rounded-full transition-all duration-150 active:w-[60px] active:h-[60px]"></div>
</button>
<!-- Gallery/Upload (Secondary action) -->
<button class="w-12 h-12 rounded-full bg-surface-variant/20 backdrop-blur-md flex items-center justify-center text-on-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">photo_library</span>
</button>
</div>
</footer>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-safe h-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] font-['Inter'] text-[11px] font-medium tracking-wide">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-1 hover:opacity-80 active:scale-90 transition-transform duration-150 w-16">
<span class="material-symbols-outlined mb-1">home</span>
        Home
    </button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-1 hover:opacity-80 active:scale-90 transition-transform duration-150 w-16">
<span class="material-symbols-outlined mb-1">calendar_today</span>
        Schedule
    </button>
<button class="flex flex-col items-center justify-center text-[#007AFF] dark:text-[#007AFF] py-1 hover:opacity-80 active:scale-90 transition-transform duration-150 w-16">
<span class="material-symbols-outlined mb-1 fill">add_circle</span>
        Add
    </button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-1 hover:opacity-80 active:scale-90 transition-transform duration-150 w-16">
<span class="material-symbols-outlined mb-1">favorite</span>
        Health
    </button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-1 hover:opacity-80 active:scale-90 transition-transform duration-150 w-16">
<span class="material-symbols-outlined mb-1">settings</span>
        Settings
    </button>
</nav>
</body></html>
